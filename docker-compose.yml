services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]

  elasticmq:
    image: softwaremill/elasticmq-native:latest
    ports:
      - "9324:9324"
      - "9325:9325"
    volumes:
      - ./scripts/elasticmq.conf:/opt/elasticmq.conf

  setup:
    image: amazon/aws-cli:latest
    depends_on:
      - dynamodb-local
      - elasticmq
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_REGION: us-east-1
    entrypoint: /bin/sh
    command:
      - -c
      - |
        sleep 2
        aws dynamodb create-table \
          --endpoint-url http://dynamodb-local:8000 \
          --table-name deploy-sentinel-deployments-dev \
          --attribute-definitions \
            AttributeName=pk,AttributeType=S \
            AttributeName=sk,AttributeType=S \
            AttributeName=deploymentId,AttributeType=S \
          --key-schema \
            AttributeName=pk,KeyType=HASH \
            AttributeName=sk,KeyType=RANGE \
          --global-secondary-indexes \
            '[{"IndexName":"gsi1-deployment-id","KeySchema":[{"AttributeName":"deploymentId","KeyType":"HASH"}],"Projection":{"ProjectionType":"ALL"}}]' \
          --billing-mode PAY_PER_REQUEST \
          2>/dev/null || echo "Table already exists"

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      setup:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      PORT: "3000"
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      DYNAMODB_TABLE: deploy-sentinel-deployments-dev
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      SQS_QUEUE_URL: http://elasticmq:9324/queue/deploy-events
      SQS_ENDPOINT: http://elasticmq:9324
      WEBHOOK_SECRET: local-dev-secret-min16

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    depends_on:
      setup:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      DYNAMODB_TABLE: deploy-sentinel-deployments-dev
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      SQS_QUEUE_URL: http://elasticmq:9324/queue/deploy-events
      SQS_ENDPOINT: http://elasticmq:9324
      WEBHOOK_SECRET: local-dev-secret-min16
