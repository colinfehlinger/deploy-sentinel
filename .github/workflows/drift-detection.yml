name: Drift Detection

on:
  schedule:
    - cron: "0 8 * * 1" # Weekly on Monday at 8am UTC
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write

env:
  AWS_REGION: us-east-1

jobs:
  detect-drift:
    name: Detect Drift (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev, prod]
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform Init
        working-directory: infra/environments/${{ matrix.env }}
        run: terraform init

      - name: Terraform Plan (drift check)
        id: plan
        working-directory: infra/environments/${{ matrix.env }}
        run: |
          terraform plan -detailed-exitcode -var="image_tag=drift-check" 2>&1 | tee plan_output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Create issue if drift detected
        if: steps.plan.outputs.exit_code == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('infra/environments/${{ matrix.env }}/plan_output.txt', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Terraform drift detected in ${{ matrix.env }}`,
              body: `## Drift detected in \`${{ matrix.env }}\` environment\n\nThe weekly drift detection found differences between Terraform state and actual infrastructure.\n\n<details>\n<summary>Terraform Plan Output</summary>\n\n\`\`\`\n${output.substring(0, 60000)}\n\`\`\`\n\n</details>\n\n**Action Required:** Review the drift and either update Terraform or apply to fix.`,
              labels: ['infrastructure', 'drift']
            });
