name: Deploy to Dev

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: deploy-sentinel
  ENVIRONMENT: dev

jobs:
  build-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, worker]
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-${{ matrix.service }}-${{ env.ENVIRONMENT }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-${{ matrix.service }}-${{ env.ENVIRONMENT }}:latest

  terraform:
    name: Terraform Apply (Dev)
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform Init
        working-directory: infra/environments/dev
        run: terraform init

      - name: Terraform Plan
        working-directory: infra/environments/dev
        run: terraform plan -var="image_tag=${{ github.sha }}" -out=tfplan

      - name: Terraform Apply
        working-directory: infra/environments/dev
        run: terraform apply -auto-approve tfplan

  deploy-ecs:
    name: Deploy ECS Services
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new deployment
        run: |
          aws ecs update-service \
            --cluster ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }} \
            --service api \
            --force-new-deployment

          aws ecs update-service \
            --cluster ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }} \
            --service worker \
            --force-new-deployment

      - name: Wait for services to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }} \
            --services api worker
        timeout-minutes: 10
