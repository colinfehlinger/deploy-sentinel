name: CI

on:
  pull_request:
    branches: [main]

jobs:
  app-checks:
    name: App Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            services/shared/package-lock.json
            services/api/package-lock.json
            services/worker/package-lock.json

      - name: Install & build shared
        working-directory: services/shared
        run: npm ci && npm run build

      - name: Install & lint API
        working-directory: services/api
        run: npm ci && npm run lint

      - name: Test API
        working-directory: services/api
        run: npm test

      - name: Install & lint Worker
        working-directory: services/worker
        run: npm ci && npm run lint

      - name: Test Worker
        working-directory: services/worker
        run: npm test

  terraform-checks:
    name: Terraform Validate (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev, prod]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform fmt
        run: terraform fmt -check -recursive infra/

      - name: Terraform init & validate
        working-directory: infra/environments/${{ matrix.env }}
        run: |
          terraform init -backend=false
          terraform validate

  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, worker]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: deploy-sentinel-${{ matrix.service }}:test

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: infra/
          soft_fail: true
